<!DOCTYPE html>
<html>
<head>
    <title>API 连接测试</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
    </style>
</head>
<body>
    <h1>OpenCode Pocket API 测试</h1>
    <div id="results"></div>
    
    <script>
        const API_BASE = 'http://localhost:8088';
        const results = document.getElementById('results');
        
        async function test(name, url) {
            const div = document.createElement('div');
            div.className = 'test';
            div.innerHTML = `<strong>${name}</strong>: 测试中...`;
            results.appendChild(div);
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                div.className = 'test success';
                div.innerHTML = `<strong>${name}</strong>: ✅ 成功<br><pre>${JSON.stringify(data, null, 2).substring(0, 500)}</pre>`;
            } catch (error) {
                div.className = 'test error';
                div.innerHTML = `<strong>${name}</strong>: ❌ 失败 - ${error.message}`;
            }
        }
        
        // 运行测试
        test('健康检查', `${API_BASE}/healthz`);
        test('实例列表', `${API_BASE}/api/instances`);
        test('任务列表', `${API_BASE}/api/tasks`);
    </script>
</body>
</html>
